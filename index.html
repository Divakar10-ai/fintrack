<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinTrack — Personal Finance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --accent: #c8f04a;
    --accent2: #4af0c8;
    --red: #f04a6a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --income: #4af0c8;
    --expense: #f04a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,74,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,74,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--text); }

  .month-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Summary Cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--accent); }

  .card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    border-radius: 50%;
    filter: blur(30px);
    opacity: 0.15;
  }

  .card.income::after { background: var(--income); }
  .card.expense::after { background: var(--expense); }
  .card.net::after { background: var(--accent); }

  .card-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .card-value {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1;
  }

  .card.income .card-value { color: var(--income); }
  .card.expense .card-value { color: var(--expense); }
  .card.net .card-value { color: var(--accent); }

  .card-count { font-size: 10px; color: var(--muted); margin-top: 6px; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab.active {
    background: var(--accent);
    color: var(--bg);
    font-weight: 500;
  }

  /* Add Form */
  .form-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }

  .form-panel.active { display: block; animation: slideIn 0.2s ease; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-row.single { grid-template-columns: 1fr; }

  .field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }

  .type-toggle { display: flex; gap: 8px; }

  .type-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .type-btn.active.income { border-color: var(--income); color: var(--income); background: rgba(74,240,200,0.08); }
  .type-btn.active.expense { border-color: var(--expense); color: var(--expense); background: rgba(240,74,106,0.08); }

  .btn-submit {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 12px;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-submit:hover { opacity: 0.85; }

  /* Budget Form */
  .budget-form {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .budget-form .field { flex: 1; }
  .budget-form .field:last-child { flex: 0 0 auto; }

  .btn-small {
    padding: 10px 16px;
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--accent);

      <div class="form-row single">
        <div class="field">
          <label>Date</label>
          <input type="date" id="txDate"/>
        </div>
      </div>

      <button class="btn-submit" onclick="addTransaction()">Add Transaction</button>
    </div>
  </div>

  <!-- BUDGETS PANEL -->
  <div class="panel" id="panel-budgets">
    <div class="form-panel active">
      <div class="form-title">Set Monthly Budget</div>
      <div class="budget-form">
        <div class="field">
          <label>Category</label>
          <select id="budgetCat">
            <option value="food">Food</option>
            <option value="transport">Transport</option>
            <option value="housing">Housing</option>
            <option value="health">Health</option>
            <option value="entertainment">Entertainment</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field">
          <label>Amount ($)</label>
          <input type="number" id="budgetAmount" placeholder="0.00" min="0"/>
        </div>
        <button class="btn-small" onclick="setBudget()">Set</button>
      </div>
    </div>

    <div class="section-title">Budget Status</div>
    <div id="budgetList">
      <div class="empty"><div class="empty-icon">📊</div>No budgets set yet.</div>
    </div>
  </div>

  <!-- ANALYTICS PANEL -->
  <div class="panel" id="panel-analytics">
    <div class="section-title">Spending by Category</div>
    <div id="categoryBreakdown">
      <div class="empty"><div class="empty-icon">📈</div>Add some expenses to see analytics.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let transactions = JSON.parse(localStorage.getItem('ft_transactions') || '[]');
let budgets = JSON.parse(localStorage.getItem('ft_budgets') || '{}');
let nextId = parseInt(localStorage.getItem('ft_nextId') || '1');
let currentType = 'expense';

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('monthBadge').textContent =
    now.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
  document.getElementById('txDate').value = now.toISOString().split('T')[0];
  render();
});

// ── Helpers ──────────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('ft_transactions', JSON.stringify(transactions));
  localStorage.setItem('ft_budgets', JSON.stringify(budgets));
  localStorage.setItem('ft_nextId', nextId);
}

function fmt(n) {
  return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function currentMonth() {
  return new Date().toISOString().slice(0, 7);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['transactions','add','budgets','analytics'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

// ── Type toggle ───────────────────────────────────────────────────────────────
function setType(type) {
  currentType = type;
  document.getElementById('btnExpense').className = 'type-btn' + (type === 'expense' ? ' active expense' : '');
  document.getElementById('btnIncome').className = 'type-btn' + (type === 'income' ? ' active income' : '');
}

// ── Add Transaction ───────────────────────────────────────────────────────────
function addTransaction() {
  const amount = parseFloat(document.getElementById('txAmount').value);
  const desc = document.getElementById('txDesc').value.trim();
  const category = document.getElementById('txCategory').value;
  const date = document.getElementById('txDate').value;

  if (!amount || amount <= 0) { toast('⚠️ Enter a valid amount'); return; }
  if (!desc) { toast('⚠️ Enter a description'); return; }
  if (!date) { toast('⚠️ Select a date'); return; }

  transactions.unshift({ id: nextId++, type: currentType, amount, description: desc, category, date });
  save();
  render();

  // Reset
  document.getElementById('txAmount').value = '';
  document.getElementById('txDesc').value = '';
  toast('✔ Transaction added!');
  switchTab('transactions');
}

// ── Delete ────────────────────────────────────────────────────────────────────
function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  save();
  render();
  toast('Deleted');
}

// ── Budget ────────────────────────────────────────────────────────────────────
function setBudget() {
  const cat = document.getElementById('budgetCat').value;
  const amount = parseFloat(document.getElementById('budgetAmount').value);
  if (!amount || amount <= 0) { toast('⚠️ Enter a valid amount'); return; }
  budgets[cat] = amount;
  save();
  renderBudgets();
  document.getElementById('budgetAmount').value = '';
  toast(`✔ Budget set for ${cat}`);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  renderSummary();
  renderTransactions();
  renderBudgets();
  renderAnalytics();
}

function renderSummary() {
  const month = currentMonth();
  const monthly = transactions.filter(t => t.date.startsWith(month));
  const income = monthly.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = monthly.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const net = income - expense;

  document.getElementById('totalIncome').textContent = fmt(income);
  document.getElementById('totalExpense').textContent = fmt(expense);
  document.getElementById('netBalance').textContent = (net < 0 ? '-' : '') + fmt(net);
  document.getElementById('incomeCount').textContent = monthly.filter(t => t.type === 'income').length + ' transactions';
  document.getElementById('expenseCount').textContent = monthly.filter(t => t.type === 'expense').length + ' transactions';
  document.getElementById('netStatus').textContent = net >= 0 ? '▲ positive' : '▼ overspent';
  document.getElementById('netBalance').style.color = net >= 0 ? 'var(--accent)' : 'var(--expense)';
}

function renderTransactions() {
  const list = document.getElementById('txList');
  const month = currentMonth();
  const monthly = transactions.filter(t => t.date.startsWith(month));

  if (!monthly.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No transactions this month.<br/>Tap "+ Add" to get started.</div>';
    return;
  }

  list.innerHTML = monthly.map(t => `
    <div class="tx-item">
      <div class="tx-dot ${t.type}"></div>
      <div class="tx-info">
        <div class="tx-desc">${t.description}</div>
        <div class="tx-meta">${t.category} · ${t.date}</div>
      </div>
      <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
      <button class="tx-delete" onclick="deleteTransaction(${t.id})">×</button>
    </div>
  `).join('');
}

function renderBudgets() {
  const list = document.getElementById('budgetList');
  const month = currentMonth();

  const spending = {};
  transactions.filter(t => t.type === 'expense' && t.date.startsWith(month))
    .forEach(t => { spending[t.category] = (spending[t.category] || 0) + t.amount; });

  const cats = Object.keys(budgets);
  if (!cats.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>No budgets set yet.</div>';
    return;
  }

  list.innerHTML = cats.map(cat => {
    const budget = budgets[cat];
    const spent = spending[cat] || 0;
    const ratio = Math.min(spent / budget, 1);
    const pct = Math.round(ratio * 100);
    const cls = ratio < 0.75 ? 'safe' : ratio < 1 ? 'warn' : 'over';
    const remaining = budget - spent;

    return `
      <div class="budget-item">
        <div class="budget-header">
          <div class="budget-cat">${cat} ${cls === 'over' ? '⚠️' : ''}</div>
          <div class="budget-amounts">${fmt(spent)} / ${fmt(budget)} (${pct}%)</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${cls}" style="width:${pct}%"></div>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:6px">
          ${remaining >= 0 ? fmt(remaining) + ' remaining' : fmt(Math.abs(remaining)) + ' over budget'}
        </div>
      </div>
    `;
  }).join('');
}

function renderAnalytics() {
  const wrap = document.getElementById('categoryBreakdown');
  const month = currentMonth();
  const expenses = transactions.filter(t => t.type === 'expense' && t.date.startsWith(month));

  if (!expenses.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">📈</div>Add some expenses to see analytics.</div>';
    return;
  }

  const cats = {};
  expenses.forEach(t => { cats[t.category] = (cats[t.category] || 0) + t.amount; });
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  const max = sorted[0][1];

  wrap.innerHTML = sorted.map(([cat, total]) => `
    <div class="cat-item">
      <div class="cat-name">${cat}</div>
      <div class="cat-bar-wrap">
        <div class="cat-bar" style="width:${(total/max*100).toFixed(1)}%"></div>
      </div>
      <div class="cat-amount">${fmt(total)}</div>
    </div>
  `).join('');
}
</script>
